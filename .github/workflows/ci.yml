name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks (ubuntu-latest, Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: ${{ matrix.node-version == '20.x' }}

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x
          - 24.x
          - 26.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Cache Turbo task outputs
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-checks-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-checks-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-node-${{ matrix.node-version }}-checks-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build, typecheck, lint, and test
        run: pnpm exec turbo run build typecheck lint test --cache-dir=.turbo/cache --output-logs=new-only

  package-smoke:
    name: Package Smoke (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        node-version:
          - 22.x
          - 24.x
          - 26.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Cache Turbo task outputs
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-package-smoke-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-package-smoke-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-node-${{ matrix.node-version }}-package-smoke-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Smoke bb-app tarball
        run: pnpm exec turbo run smoke:tarball --filter=bb-app --cache-dir=.turbo/cache --output-logs=new-only
