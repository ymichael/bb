<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bb</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" id="favicon-32" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" id="favicon-16" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      (function () {
        function setFavicon(dark) {
          var s = dark ? "-dark" : "";
          document.getElementById("favicon-32").href = "/favicon-32x32" + s + ".png";
          document.getElementById("favicon-16").href = "/favicon-16x16" + s + ".png";
        }
        var mq = window.matchMedia("(prefers-color-scheme: dark)");
        setFavicon(mq.matches);
        mq.addEventListener("change", function (e) { setFavicon(e.matches); });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
